<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshAir Realty Demo</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f4f6f8;
}

.hero{
background:url("https://images.unsplash.com/photo-1560518883-ce09059eeffa") center/cover;
height:420px;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
margin-top:-80px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ddd;
}

button{
background:#0a66c2;
color:white;
border:none;
padding:14px;
width:100%;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#084c93;
}

.leads{
margin-top:30px;
}

.lead{
background:#f9fafb;
padding:12px;
border-radius:6px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="hero">
<div>
<h1>FreshAir Realty</h1>
<p>Find your dream property in New York</p>
</div>
</div>

<div class="container">

<div class="card">

<h2>Request Property Consultation</h2>

<form id="leadForm">

<label>Name</label>
<input name="name" required>

<label>Email</label>
<input name="email" type="email" required>

<label>Phone</label>
<input name="phone">

<label>Interested Area</label>
<select name="location">
<option>Manhattan</option>
<option>Brooklyn</option>
<option>Queens</option>
</select>

<label>Budget</label>
<select name="budget">
<option>$300k - $500k</option>
<option>$500k - $800k</option>
<option>$800k+</option>
</select>

<label>Message</label>
<textarea name="message"></textarea>

<button type="submit">Submit Inquiry</button>

</form>

</div>

<div class="card leads">

<h3>Recent Leads</h3>

<div id="leadList"></div>

</div>

</div>

<script>

const webhook="https://hooks.zapier.com/hooks/catch/26818877/uxn7mrh/"

const form=document.getElementById("leadForm")
const leadList=document.getElementById("leadList")

form.addEventListener("submit",async function(e){

e.preventDefault()

const data=new FormData(form)

let lead={}

data.forEach((v,k)=>lead[k]=v)

lead.page=window.location.href
lead.timestamp=new Date().toISOString()

await fetch(webhook,{
method:"POST",
mode:"no-cors",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(lead)
})

addLead(lead)

form.reset()

})

function addLead(lead){

let div=document.createElement("div")

div.className="lead"

div.innerHTML=`<b>${lead.name}</b> (${lead.email})<br>
${lead.location} • ${lead.budget}`

leadList.prepend(div)

}

</script>

</body>
</html>
